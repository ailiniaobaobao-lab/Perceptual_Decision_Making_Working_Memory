<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDM-WM task</title>

  <script src="https://unpkg.com/jspsych@8.2.3"></script>
  <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" />

  <script src="https://unpkg.com/@jspsych/plugin-instructions@2.0.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.0.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-call-function@2.0.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.0.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-virtual-chinrest@2.0.0"></script>

  <style>
    body {
      background: white;
    }

    .task-wrap {
      margin: 0 auto;
      text-align: center;
    }

    .question-title {
      font-size: 28px;
      margin-bottom: 12px;
      font-weight: 600;
      min-height: 34px;
    }

    .question-subtitle {
      font-size: 18px;
      margin-bottom: 20px;
      color: #444;
      min-height: 22px;
    }

    .pentagon-area {
      margin: 0 auto;
      position: relative;
    }

    .option-btn {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      padding: 0;
      line-height: 0;
      cursor: pointer;
      transform: translate(-50%, -50%);
    }

    .option-btn.hidden {
      visibility: hidden;
      pointer-events: none;
    }

    .option-btn svg {
      overflow: visible;
      display: block;
      margin: 0;
    }

    .confidence-wrap {
      width: 800px;
      margin: 100px auto 0 auto;
      text-align: center;
    }

    .confidence-title {
      font-size: 30px;
      margin-bottom: 18px;
      font-weight: 600;
    }

    .confidence-subtitle {
      font-size: 18px;
      margin-bottom: 35px;
      color: #444;
    }

    .confidence-buttons {
      display: flex;
      justify-content: center;
      gap: 22px;
      margin-top: 20px;
    }

    .conf-btn {
      width: 90px;
      height: 90px;
      font-size: 32px;
      border-radius: 14px;
      border: 2px solid #222;
      background: white;
      cursor: pointer;
    }

    .confidence-anchor-row {
      width: 520px;
      margin: 14px auto 0 auto;
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      color: #555;
    }

    .small-note {
      font-size: 16px;
      color: #666;
      margin-top: 12px;
    }

    .feedback-wrap {
      width: 800px;
      margin: 140px auto 0 auto;
      text-align: center;
    }

    .feedback-title {
      font-size: 44px;
      font-weight: 700;
      color: #178f3c;
      line-height: 1.1;
    }

    .feedback-points {
      margin-top: 10px;
      font-size: 30px;
      font-weight: 600;
      color: #178f3c;
      line-height: 1.1;
    }

    .fixation {
      font-size: 64px;
      font-weight: 600;
    }

    .subject-wrap {
      max-width: 700px;
      margin: 120px auto;
      text-align: center;
      font-size: 24px;
      line-height: 1.6;
    }

    .subject-input {
      font-size: 28px;
      padding: 10px 14px;
      width: 220px;
      text-align: center;
      margin-top: 16px;
    }

    .subject-btn {
      font-size: 22px;
      padding: 10px 22px;
      margin-top: 20px;
      cursor: pointer;
    }

    .error-text {
      color: #b00020;
      margin-top: 12px;
      font-size: 18px;
      min-height: 24px;
    }
  </style>
</head>
<body></body>

<script>
  /**********************
   * 1. BASIC SETTINGS  *
   **********************/
  const CONFIG = {
    nOptions: 5,
    stimulusDurations: [500, 1500],
    fixationDuration: 700,
    interTrialInterval: 500,
    correctFeedbackDuration: 900,
    stimulusRadius: 52,
    svgSize: 120,
    maxDotCount: 100,
    practiceBlock1Duration: 1500,
    practiceBlock2Durations: [500, 1500],
    practiceBlock1Trials: 12,
    practiceBlock2Trials: 12,
    practiceBlock3RepeatsPerCondition: 2,
    practiceEasyStep: 12,
    mainRepeatsPerCondition: 60,
    mainTrialsPerBlock: 40
  };

  const DOT_COUNT_CONDITION_PATTERNS = [
    {
      id: "cond_1",
      label: "all_different",
      tierPattern: [0, 1, 2, 3, 4]
    },
    {
      id: "cond_2",
      label: "two_pairs_same",
      tierPattern: [0, 1, 1, 2, 2]
    },
    {
      id: "cond_3",
      label: "three_same",
      tierPattern: [0, 1, 1, 1, 2]
    },
    {
      id: "cond_4",
      label: "four_same",
      tierPattern: [0, 1, 1, 1, 1]
    }
  ];

  const MAIN_CONDITION_STEPS_BY_DURATION = {
    500: {
      cond_1: 4,
      cond_2: 6,
      cond_3: 7,
      cond_4: 8
    },
    1500: {
      cond_1: 3,
      cond_2: 4,
      cond_3: 6,
      cond_4: 7
    }
  };

  const PRACTICE_EASY_CONDITION = {
    id: "easy",
    label: "all_different",
    step: CONFIG.practiceEasyStep,
    tierPattern: [0, 1, 2, 3, 4]
  };

  /*************************
   * 2. HELPER FUNCTIONS   *
   *************************/
  function shuffle(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function mulberry32(seed) {
    return function() {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function downloadCSV(filename, text) {
    const blob = new Blob([text], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.setAttribute("href", url);
    link.setAttribute("download", filename);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  function positionName(index) {
    const map = {
      0: "top",
      1: "upper_left",
      2: "upper_right",
      3: "lower_left",
      4: "lower_right"
    };
    return map[index];
  }

  function degToPx(deg, pxPerMm, viewingDistanceMm) {
    const mm = 2 * viewingDistanceMm * Math.tan((deg * Math.PI / 180) / 2);
    return mm * pxPerMm;
  }

  function pxToDeg(px, pxPerMm, viewingDistanceMm) {
    const mm = px / pxPerMm;
    return 2 * Math.atan((mm / 2) / viewingDistanceMm) * 180 / Math.PI;
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  /*************************************
   * 3. CALIBRATION / DISPLAY SCALING  *
   *************************************/
  const BASELINE_RENDER = {
    pxPerMm: 96 / 25.4,
    viewingDistanceMm: 600,
    areaWidthPx: 900,
    areaHeightPx: 620,
    buttonSizePx: 150,
    displayedSvgSizePx: 120,
    centersPx: [
      { x: 435, y: 70 },
      { x: 180, y: 230 },
      { x: 690, y: 230 },
      { x: 280, y: 460 },
      { x: 590, y: 460 }
    ]
  };

  const calibrationState = {
    pixelsPerMm: BASELINE_RENDER.pxPerMm,
    viewingDistanceMm: BASELINE_RENDER.viewingDistanceMm,
    calibrated: false
  };

  const TARGET_VISUAL_ANGLES = {
    areaWidthDeg: pxToDeg(BASELINE_RENDER.areaWidthPx, BASELINE_RENDER.pxPerMm, BASELINE_RENDER.viewingDistanceMm),
    areaHeightDeg: pxToDeg(BASELINE_RENDER.areaHeightPx, BASELINE_RENDER.pxPerMm, BASELINE_RENDER.viewingDistanceMm),
    buttonSizeDeg: pxToDeg(BASELINE_RENDER.buttonSizePx, BASELINE_RENDER.pxPerMm, BASELINE_RENDER.viewingDistanceMm),
    displayedSvgSizeDeg: pxToDeg(BASELINE_RENDER.displayedSvgSizePx, BASELINE_RENDER.pxPerMm, BASELINE_RENDER.viewingDistanceMm),
    centersDeg: BASELINE_RENDER.centersPx.map(c => ({
      x: pxToDeg(c.x, BASELINE_RENDER.pxPerMm, BASELINE_RENDER.viewingDistanceMm),
      y: pxToDeg(c.y, BASELINE_RENDER.pxPerMm, BASELINE_RENDER.viewingDistanceMm)
    }))
  };

  let DISPLAY = {
    areaWidthPx: BASELINE_RENDER.areaWidthPx,
    areaHeightPx: BASELINE_RENDER.areaHeightPx,
    buttonSizePx: BASELINE_RENDER.buttonSizePx,
    displayedSvgSizePx: BASELINE_RENDER.displayedSvgSizePx,
    centersPx: BASELINE_RENDER.centersPx
  };

  function updateDisplayMetrics() {
    let ppm = calibrationState.pixelsPerMm;
    let vdm = calibrationState.viewingDistanceMm;

    if (!Number.isFinite(ppm) || ppm <= 0) ppm = BASELINE_RENDER.pxPerMm;
    if (!Number.isFinite(vdm) || vdm <= 0) vdm = BASELINE_RENDER.viewingDistanceMm;

    DISPLAY = {
      areaWidthPx: clamp(degToPx(TARGET_VISUAL_ANGLES.areaWidthDeg, ppm, vdm), 700, 1500),
      areaHeightPx: clamp(degToPx(TARGET_VISUAL_ANGLES.areaHeightDeg, ppm, vdm), 500, 1100),
      buttonSizePx: clamp(degToPx(TARGET_VISUAL_ANGLES.buttonSizeDeg, ppm, vdm), 110, 260),
      displayedSvgSizePx: clamp(degToPx(TARGET_VISUAL_ANGLES.displayedSvgSizeDeg, ppm, vdm), 90, 220),
      centersPx: TARGET_VISUAL_ANGLES.centersDeg.map(c => ({
        x: degToPx(c.x, ppm, vdm),
        y: degToPx(c.y, ppm, vdm)
      }))
    };
  }

  updateDisplayMetrics();

  function getOptionStyle(index) {
    const center = DISPLAY.centersPx[index];
    return `
      left: ${center.x}px;
      top: ${center.y}px;
      width: ${DISPLAY.buttonSizePx}px;
      height: ${DISPLAY.buttonSizePx}px;
    `;
  }

  /**********************************
   * 4. DOT GENERATION              *
   **********************************/
  function generateDots(nDots, seed) {
    const rand = mulberry32(seed);
    const points = [];
    const center = CONFIG.svgSize / 2;
    const margin = 10;
    const radius = CONFIG.stimulusRadius - 6;

    let attempts = 0;
    while (points.length < nDots && attempts < nDots * 250) {
      attempts++;
      const x = margin + rand() * (CONFIG.svgSize - 2 * margin);
      const y = margin + rand() * (CONFIG.svgSize - 2 * margin);

      const dx = x - center;
      const dy = y - center;
      const inside = (dx * dx + dy * dy) <= radius * radius;
      if (!inside) continue;

      let overlaps = false;
      for (const p of points) {
        const ddx = x - p.x;
        const ddy = y - p.y;
        if (ddx * ddx + ddy * ddy < 20) {
          overlaps = true;
          break;
        }
      }
      if (!overlaps) points.push({ x, y });
    }
    return points;
  }

  /**********************************
   * 5. BUILD TRIAL CONFIGURATIONS  *
   **********************************/
  function buildDotCounts(conditionSpec) {
    return conditionSpec.tierPattern.map(level => {
      return CONFIG.maxDotCount - conditionSpec.step * level;
    });
  }

  function getMainConditionSpecsForDuration(duration) {
    const stepsForDuration = MAIN_CONDITION_STEPS_BY_DURATION[duration] ?? {};

    return DOT_COUNT_CONDITION_PATTERNS.map(conditionPattern => ({
      ...conditionPattern,
      step: stepsForDuration[conditionPattern.id]
    })).filter(conditionSpec => Number.isFinite(conditionSpec.step));
  }

  function buildMainConditionCombos() {
    const combos = [];

    CONFIG.stimulusDurations.forEach(duration => {
      getMainConditionSpecsForDuration(duration).forEach(conditionSpec => {
        combos.push({ duration, conditionSpec });
      });
    });

    return combos;
  }

  function buildRepeatedCombos(baseCombos, repeatsPerCombo) {
    const combos = [];

    for (let repeatIndex = 0; repeatIndex < repeatsPerCombo; repeatIndex++) {
      baseCombos.forEach(combo => {
        combos.push({ ...combo });
      });
    }

    return combos;
  }

  function getPointsForAttempt(attemptNumber) {
    const pointsByAttempt = [10, 8, 6, 4, 0];
    return pointsByAttempt[attemptNumber - 1] ?? 0;
  }

  function renderCorrectFeedback() {
    const pointsLine = trialState.currentTrial?.practice
      ? ""
      : `<div class="feedback-points">+${trialState.lastPointsAwarded} points</div>`;

    return `
      <div class="feedback-wrap">
        <div class="feedback-title">CORRECT!</div>
        ${pointsLine}
      </div>
    `;
  }

  function buildBalancedDurationList(durations, nTrials) {
    const durationList = [];
    for (let i = 0; i < nTrials; i++) {
      durationList.push(durations[i % durations.length]);
    }
    return shuffle(durationList);
  }

  function makeDotCountTrial(trialIndex, duration, conditionSpec, options = {}) {
    const {
      practice = false,
      conditionNamePrefix = ""
    } = options;

    const dotCounts = shuffle(buildDotCounts(conditionSpec));
    const correctPosition = dotCounts.indexOf(CONFIG.maxDotCount);

    const trialOptions = dotCounts.map((nDots, optionIndex) => {
      const points = generateDots(nDots, trialIndex * 100 + optionIndex * 17 + 1);
      return { nDots, points };
    });

    return {
      trialIndex,
      practice,
      duration,
      condition_name: conditionNamePrefix
        ? `${conditionNamePrefix}_${conditionSpec.id}_${conditionSpec.label}`
        : `${conditionSpec.id}_${conditionSpec.label}`,
      correctPosition,
      options: trialOptions
    };
  }

  function buildTrialsFromCombos(combos, startIndex, options = {}) {
    return shuffle(combos).map(({ duration, conditionSpec }, index) => {
      return makeDotCountTrial(startIndex + index, duration, conditionSpec, options);
    });
  }

  function buildPracticeBlocks(startIndex) {
    let counter = startIndex;

    const block1Combos = Array.from({ length: CONFIG.practiceBlock1Trials }, () => ({
      duration: CONFIG.practiceBlock1Duration,
      conditionSpec: PRACTICE_EASY_CONDITION
    }));
    const block1Trials = buildTrialsFromCombos(block1Combos, counter, {
      practice: true,
      conditionNamePrefix: "practice_block_1"
    });
    counter += block1Trials.length;

    const block2Combos = buildBalancedDurationList(
      CONFIG.practiceBlock2Durations,
      CONFIG.practiceBlock2Trials
    ).map(duration => ({
      duration,
      conditionSpec: PRACTICE_EASY_CONDITION
    }));
    const block2Trials = buildTrialsFromCombos(block2Combos, counter, {
      practice: true,
      conditionNamePrefix: "practice_block_2"
    });
    counter += block2Trials.length;

    const block3Combos = buildRepeatedCombos(
      buildMainConditionCombos(),
      CONFIG.practiceBlock3RepeatsPerCondition
    );
    const block3Trials = buildTrialsFromCombos(block3Combos, counter, {
      practice: true,
      conditionNamePrefix: "practice_block_3"
    });

    return [
      {
        title: "Practice 1",
        description: "",
        trials: block1Trials
      },
      {
        title: "Practice 2",
        description: "The trials will now become a bit more difficult.",
        trials: block2Trials
      },
      {
        title: "Practice 3",
        description: "The trials will now become more difficult and match the main experiment.",
        trials: block3Trials
      }
    ];
  }

  function buildMainTrials(startIndex) {
    const mainCombos = buildRepeatedCombos(
      buildMainConditionCombos(),
      CONFIG.mainRepeatsPerCondition
    );
    return buildTrialsFromCombos(mainCombos, startIndex);
  }

  const practiceBlocks = buildPracticeBlocks(1);
  const practiceTrials = practiceBlocks.reduce((allTrials, block) => {
    return allTrials.concat(block.trials);
  }, []);
  const mainTrials = buildMainTrials(practiceTrials.length + 1);

  /****************************
   * 6. GLOBAL STATE STORAGE *
   ****************************/
  const experimentState = {
    subjectID: "",
    totalPoints: 0
  };

  const trialState = {
    currentTrial: null,
    available: [],
    choiceNumber: 0,
    trialStartTime: null,
    choiceScreenStartTime: null,
    confidenceScreenStartTime: null,
    lastChoice: null,
    lastChoiceCorrect: null,
    lastChoiceRT: null,
    lastPointsAwarded: 0
  };

  function initializeTrialState(trialConfig) {
    trialState.currentTrial = trialConfig;
    trialState.available = Array(CONFIG.nOptions).fill(true);
    trialState.choiceNumber = 0;
    trialState.trialStartTime = performance.now();
    trialState.choiceScreenStartTime = null;
    trialState.confidenceScreenStartTime = null;
    trialState.lastChoice = null;
    trialState.lastChoiceCorrect = null;
    trialState.lastChoiceRT = null;
    trialState.lastPointsAwarded = 0;
  }

  /***********************
   * 7. JSPSYCH SETUP    *
   ***********************/
  const jsPsych = initJsPsych({
    on_finish: function() {
      const raw = jsPsych.data.get().values();

      const cleaned = raw.map(row => ({
        subject_id: experimentState.subjectID || null,
        pixels_per_mm: row.pixels_per_mm ?? null,
        mm_per_px: row.mm_per_px ?? null,
        viewing_distance_mm: row.viewing_distance_mm ?? null,
        event: row.event ?? null,
        rt: row.rt ?? null,
        trial_index: row.trial_index ?? null,
        practice: row.practice ?? null,
        condition_name: row.condition_name ?? null,
        stimulus_duration: row.stimulus_duration ?? null,
        correct_position: row.correct_position ?? null,
        correct_position_name:
          row.correct_position !== undefined && row.correct_position !== null
            ? positionName(row.correct_position)
            : null,
        dot_counts: row.dot_counts ?? null,
        choice_number: row.choice_number ?? null,
        choice_index: row.choice_index ?? null,
        choice_position_name:
          row.choice_index !== undefined && row.choice_index !== null
            ? positionName(row.choice_index)
            : null,
        elapsed_ms_from_trial_start: row.elapsed_ms_from_trial_start ?? null,
        correct: row.correct ?? null,
        remaining_options_before_choice: row.remaining_options_before_choice ?? null,
        points_awarded: row.points_awarded ?? null,
        total_points: row.total_points ?? null,
        confidence_choice_correct: row.choice_correct ?? null,
        confidence_choice_rt: row.choice_rt ?? null,
        confidence: row.confidence ?? null
      }));

      const columns = [
        "subject_id",
        "pixels_per_mm",
        "mm_per_px",
        "viewing_distance_mm",
        "event",
        "rt",
        "trial_index",
        "practice",
        "condition_name",
        "stimulus_duration",
        "correct_position",
        "correct_position_name",
        "dot_counts",
        "choice_number",
        "choice_index",
        "choice_position_name",
        "elapsed_ms_from_trial_start",
        "correct",
        "remaining_options_before_choice",
        "points_awarded",
        "total_points",
        "confidence_choice_correct",
        "confidence_choice_rt",
        "confidence"
      ];

      const escapeCSV = (value) => {
        if (value === null || value === undefined) return "";
        const str = String(value);
        if (str.includes('"') || str.includes(",") || str.includes("\n")) {
          return '"' + str.replace(/"/g, '""') + '"';
        }
        return str;
      };

      const csvLines = [
        columns.join(","),
        ...cleaned.map(row => columns.map(col => escapeCSV(row[col])).join(","))
      ];

      const csv = csvLines.join("\n");
      const safeSubjectID = (experimentState.subjectID || "unknown").replace(/[^\w-]/g, "");
      downloadCSV(`p${safeSubjectID}.csv`, csv);
    }
  });

  const timeline = [];

  /*************************
   * 8. SUBJECT ID SCREEN  *
   *************************/
  const subjectIDScreen = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="subject-wrap">
        <h2>Participant ID</h2>
        <p>Please enter the participant ID before starting.</p>
        <input id="subject-id-input" class="subject-input" type="text" autocomplete="off" />
        <br>
        <button id="subject-id-btn" class="subject-btn">Continue</button>
        <div id="subject-id-error" class="error-text"></div>
      </div>
    `,
    choices: "NO_KEYS",
    on_load: function() {
      const input = document.getElementById("subject-id-input");
      const btn = document.getElementById("subject-id-btn");
      const error = document.getElementById("subject-id-error");

      input.focus();

      function submitID() {
        const value = input.value.trim();
        if (!value) {
          error.textContent = "Please enter a participant ID.";
          return;
        }
        experimentState.subjectID = value;
        jsPsych.finishTrial({
          event: "subject_id_entry",
          subject_id: value
        });
      }

      btn.addEventListener("click", submitID);
      input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
          submitID();
        }
      });
    }
  };
  timeline.push(subjectIDScreen);

  /************************************
   * 9. SCREEN / VIEWING CALIBRATION  *
   ************************************/
  const calibrationIntro = {
    type: jsPsychInstructions,
    pages: [
      `
      <div style="max-width:900px; margin:auto; text-align:left; font-size:22px; line-height:1.6;">
        <h2>Screen setup</h2>
        <p>Before the task begins, you will complete a short screen setup.</p>
        <p>This helps keep the circle size more consistent across participants.</p>
      </div>
      `,
      `
      <div style="max-width:900px; margin:auto; text-align:left; font-size:22px; line-height:1.6;">
        <h2>What you need</h2>
        <p>Please have a real credit card or bank card ready.</p>
        <p>You will first match an on-screen rectangle to the size of your card.</p>
      </div>
      `,
      `
      <div style="max-width:900px; margin:auto; text-align:left; font-size:22px; line-height:1.6;">
        <h2>Viewing distance</h2>
        <p>Next, you will complete a short blind-spot step to estimate viewing distance.</p>
        <p>Please sit normally, keep your head still, and follow the on-screen instructions carefully.</p>
      </div>
      `
    ],
    show_clickable_nav: true
  };
  timeline.push(calibrationIntro);

  const enter_fullscreen = {
    type: jsPsychFullscreen,
    fullscreen_mode: true
  };
  timeline.push(enter_fullscreen);

  const chinrest = {
    type: jsPsychVirtualChinrest,
    blindspot_reps: 3,
    resize_units: "none",
    item_path: "card.png",
    viewing_distance_report: "none",
    on_finish: function(data) {
      const pixelsPerMm =
        Number.isFinite(data.px2mm) && data.px2mm > 0
          ? data.px2mm
          : BASELINE_RENDER.pxPerMm;

      calibrationState.pixelsPerMm = pixelsPerMm;
      calibrationState.viewingDistanceMm = data.view_dist_mm;
      calibrationState.calibrated = true;
      updateDisplayMetrics();

      jsPsych.data.addProperties({
        pixels_per_mm: pixelsPerMm,
        mm_per_px:
          Number.isFinite(pixelsPerMm) && pixelsPerMm > 0
            ? 1 / pixelsPerMm
            : null,
        viewing_distance_mm: data.view_dist_mm
      });
    }
  };
  timeline.push(chinrest);

  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div style="max-width:900px; margin:auto; text-align:center; font-size:24px; line-height:1.7;">
        <h2>Screen setup complete</h2>
        <p>The task is ready to begin.</p>
        <p>Press any key to continue.</p>
      </div>
    `
  });

  /***********************
   * 10. INSTRUCTIONS    *
   ***********************/
  const instructions = {
    type: jsPsychInstructions,
    pages: [
      `
      <div style="max-width:900px; margin:auto; text-align:left; font-size:22px; line-height:1.6;">
        <h2>Task</h2>
        <p>On each trial, you will briefly see <strong>5 circles</strong>.</p>
        <p>Your task is to decide <strong>which circle had the most dots</strong>.</p>
      </div>
      `,
      `
      <div style="max-width:900px; margin:auto; text-align:left; font-size:22px; line-height:1.6;">
        <h2>Responding</h2>
        <p>After the dots disappear, the empty circles will remain on the screen.</p>
        <p>Select the circle that had the most dots.</p>
        <p>If your choice is incorrect, that option will disappear and you will choose again.</p>
      </div>
      `,
      `
      <div style="max-width:900px; margin:auto; text-align:left; font-size:22px; line-height:1.6;">
        <h2>Confidence</h2>
        <p>After each choice, rate how confident you are from <strong>1 to 4</strong>.</p>
        <p><strong>1</strong> = not confident</p>
        <p><strong>4</strong> = very confident</p>
      </div>
      `,
      `
      <div style="max-width:900px; margin:auto; text-align:left; font-size:22px; line-height:1.6;">
        <h2>Points and bonus</h2>
        <p>In the main task, earlier correct answers earn more points.</p>
        <p>The first correct choice earns the most points, and later correct choices earn fewer points.</p>
        <p>Your bonus payment will depend on your total score.</p>
      </div>
      `
    ],
    show_clickable_nav: true
  };
  timeline.push(instructions);

  /**********************************
   * 11. DISPLAY RENDER FUNCTIONS   *
   **********************************/
  function renderTaskDisplayFrame(optionHTML, titleText, subtitleText) {
    return `
      <div class="task-wrap" style="width:${DISPLAY.areaWidthPx}px;">
        <div class="question-title">${titleText}</div>
        <div class="question-subtitle">${subtitleText}</div>
        <div class="pentagon-area" style="width:${DISPLAY.areaWidthPx}px; height:${DISPLAY.areaHeightPx}px;">
          ${optionHTML}
        </div>
      </div>
    `;
  }

  function renderStimulusDisplay(trialConfig) {
    const optionHTML = trialConfig.options.map((opt, idx) => {
      return `
        <div class="option-btn" style="${getOptionStyle(idx)} cursor: default;">
          ${renderOptionSVG(opt, true)}
        </div>
      `;
    }).join("");

    return renderTaskDisplayFrame(optionHTML, "Which circle has the most dots?", "Look carefully.");
  }

  function renderChoiceDisplay() {
    const trialConfig = trialState.currentTrial;
    const optionHTML = trialConfig.options.map((opt, idx) => {
      const hiddenClass = trialState.available[idx] ? "" : "hidden";
      return `
        <div class="option-btn choice-option ${hiddenClass}" style="${getOptionStyle(idx)}"
             data-index="${idx}"
             role="button"
             tabindex="0"
             aria-label="option ${idx + 1}">
          ${renderOptionSVG(opt, false)}
        </div>
      `;
    }).join("");

    return renderTaskDisplayFrame(optionHTML, "Which circle has the most dots?", "Look carefully.");
  }

  function renderConfidenceDisplay() {
    return `
      <div class="confidence-wrap">
        <div class="confidence-title">How confident are you?</div>
        <div class="confidence-subtitle">
          Confidence for choice ${trialState.choiceNumber}
        </div>

        <div class="confidence-buttons">
          <button class="conf-btn confidence-btn" data-conf="1">1</button>
          <button class="conf-btn confidence-btn" data-conf="2">2</button>
          <button class="conf-btn confidence-btn" data-conf="3">3</button>
          <button class="conf-btn confidence-btn" data-conf="4">4</button>
        </div>

        <div class="confidence-anchor-row">
          <div>Not confident</div>
          <div>Very confident</div>
        </div>
      </div>
    `;
  }

  function renderOptionSVG(option, showDots = true) {
    const center = CONFIG.svgSize / 2;
    const radius = CONFIG.stimulusRadius;

    const outline = `
      <circle cx="${center}" cy="${center}" r="${radius}"
        fill="white" stroke="black" stroke-width="3"></circle>
    `;

    const dots = showDots
      ? option.points.map(p => {
          return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.8" fill="black"></circle>`;
        }).join("")
      : "";

    return `
      <svg width="${DISPLAY.displayedSvgSizePx}" height="${DISPLAY.displayedSvgSizePx}" viewBox="0 0 ${CONFIG.svgSize} ${CONFIG.svgSize}">
        ${outline}
        ${dots}
      </svg>
    `;
  }

  /**************************
   * 12. GENERIC TRIAL PIECES
   **************************/
  function makeTrialTimeline(trialConfig) {
    const initTrial = {
      type: jsPsychCallFunction,
      func: function() {
        initializeTrialState(trialConfig);
      },
      data: {
        event: "initialize_trial",
        trial_index: trialConfig.trialIndex,
        practice: trialConfig.practice,
        condition_name: trialConfig.condition_name,
        stimulus_duration: trialConfig.duration,
        correct_position: trialConfig.correctPosition
      }
    };

    const fixation = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `<div class="fixation">+</div>`,
      choices: "NO_KEYS",
      trial_duration: CONFIG.fixationDuration,
      data: {
        event: "fixation",
        trial_index: trialConfig.trialIndex,
        practice: trialConfig.practice,
        condition_name: trialConfig.condition_name,
        stimulus_duration: trialConfig.duration,
        correct_position: trialConfig.correctPosition
      }
    };

    const stimulus = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        return renderStimulusDisplay(trialConfig);
      },
      choices: "NO_KEYS",
      trial_duration: trialConfig.duration,
      data: {
        event: "stimulus",
        trial_index: trialConfig.trialIndex,
        practice: trialConfig.practice,
        condition_name: trialConfig.condition_name,
        stimulus_duration: trialConfig.duration,
        correct_position: trialConfig.correctPosition,
        dot_counts: JSON.stringify(trialConfig.options.map(x => x.nDots))
      }
    };

    const choice = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        return renderChoiceDisplay();
      },
      choices: "NO_KEYS",
      on_load: function() {
        trialState.choiceScreenStartTime = performance.now();

        const clickable = document.querySelectorAll(".choice-option:not(.hidden)");
        clickable.forEach(btn => {
          btn.addEventListener("click", function() {
            const selectedIndex = parseInt(this.dataset.index, 10);
            const rt = Math.round(performance.now() - trialState.choiceScreenStartTime);
            const elapsedMs = Math.round(performance.now() - trialState.trialStartTime);
            const correct = selectedIndex === trialState.currentTrial.correctPosition;

            jsPsych.finishTrial({
              event: "choice",
              trial_index: trialState.currentTrial.trialIndex,
              practice: trialState.currentTrial.practice,
              condition_name: trialState.currentTrial.condition_name,
              stimulus_duration: trialState.currentTrial.duration,
              correct_position: trialState.currentTrial.correctPosition,
              choice_number: trialState.choiceNumber + 1,
              choice_index: selectedIndex,
              rt: rt,
              elapsed_ms_from_trial_start: elapsedMs,
              correct: correct,
              remaining_options_before_choice: trialState.available.filter(x => x).length
            });
          });
        });
      },
      on_finish: function(data) {
        trialState.choiceNumber += 1;
        trialState.lastChoice = data.choice_index;
        trialState.lastChoiceCorrect = data.correct;
        trialState.lastChoiceRT = data.rt;
        trialState.lastPointsAwarded = data.correct
          ? getPointsForAttempt(data.choice_number)
          : 0;

        if (!data.correct) {
          trialState.available[data.choice_index] = false;
        }
      }
    };

    const confidence = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        return renderConfidenceDisplay();
      },
      choices: "NO_KEYS",
      on_load: function() {
        trialState.confidenceScreenStartTime = performance.now();

        const buttons = document.querySelectorAll(".confidence-btn");
        buttons.forEach(btn => {
          btn.addEventListener("click", function() {
            const conf = parseInt(this.dataset.conf, 10);
            const rt = Math.round(performance.now() - trialState.confidenceScreenStartTime);

            jsPsych.finishTrial({
              event: "confidence",
              trial_index: trialState.currentTrial.trialIndex,
              practice: trialState.currentTrial.practice,
              condition_name: trialState.currentTrial.condition_name,
              stimulus_duration: trialState.currentTrial.duration,
              correct_position: trialState.currentTrial.correctPosition,
              choice_number: trialState.choiceNumber,
              choice_index: trialState.lastChoice,
              choice_correct: trialState.lastChoiceCorrect,
              choice_rt: trialState.lastChoiceRT,
              confidence: conf,
              rt: rt
            });
          });
        });
      }
    };

    const chooseUntilCorrect = {
      timeline: [choice, confidence],
      loop_function: function() {
        return !trialState.lastChoiceCorrect;
      }
    };

    const iti = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        return renderCorrectFeedback();
      },
      choices: "NO_KEYS",
      trial_duration: CONFIG.correctFeedbackDuration,
      on_start: function(trial) {
        const pointsAwarded = trialConfig.practice ? 0 : trialState.lastPointsAwarded;
        experimentState.totalPoints += pointsAwarded;
        trial.data.points_awarded = pointsAwarded;
        trial.data.total_points = experimentState.totalPoints;
      },
      data: {
        event: "iti",
        trial_index: trialConfig.trialIndex,
        practice: trialConfig.practice,
        condition_name: trialConfig.condition_name,
        stimulus_duration: trialConfig.duration,
        correct_position: trialConfig.correctPosition
      }
    };

    return {
      timeline: [initTrial, fixation, stimulus, chooseUntilCorrect, iti]
    };
  }

  /***********************
   * 13. BUILD TIMELINE  *
   ***********************/
  practiceBlocks.forEach(block => {
    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div style="max-width:900px; margin:auto; text-align:center; font-size:26px; line-height:1.7;">
          <h2>${block.title}</h2>
          ${block.description ? `<p>${block.description}</p>` : ""}
          <p>You will complete ${block.trials.length} practice trials in this block.</p>
          <p>Press any key to start.</p>
        </div>
      `
    });

    block.trials.forEach(trialConfig => {
      timeline.push(makeTrialTimeline(trialConfig));
    });
  });

  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div style="max-width:900px; margin:auto; text-align:center; font-size:26px; line-height:1.7;">
        <h2>Main task</h2>
        <p>Practice is complete.</p>
        <p>From this point on, your score will count toward your bonus.</p>
        <p>Earlier correct answers earn more points.</p>
        <p>You will now complete ${mainTrials.length} main trials.</p>
        <p>Press any key to begin.</p>
      </div>
    `
  });

  mainTrials.forEach((trialConfig, idx) => {
    if (idx > 0 && idx % CONFIG.mainTrialsPerBlock === 0) {
      timeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
          <div style="max-width:900px; margin:auto; text-align:center; font-size:26px; line-height:1.7;">
            <h2>Break</h2>
            <p>You may take a short break now.</p>
            <p>Press any key when you are ready to continue.</p>
          </div>
        `
      });
    }

    timeline.push(makeTrialTimeline(trialConfig));
  });

  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div style="max-width:900px; margin:auto; text-align:center; font-size:28px; line-height:1.7;">
        <h2>Finished</h2>
        <p>Thank you for completing the experiment.</p>
        <p>Your responses have been recorded.</p>
        <p>Press any key to end.</p>
      </div>
    `
  });

  /***********************
   * 14. RUN EXPERIMENT  *
   ***********************/
  jsPsych.run(timeline);
</script>
</html>
