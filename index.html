<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDM-WM task</title>

  <script src="https://unpkg.com/jspsych@8.2.3"></script>
  <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" />

  <script src="https://unpkg.com/@jspsych/plugin-instructions@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-call-function@2.1.0"></script>

  <style>
    body {
      background: white;
    }

    .task-wrap {
      width: 950px;
      margin: 0 auto;
      text-align: center;
    }

    .question-title {
      font-size: 28px;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .question-subtitle {
      font-size: 18px;
      margin-bottom: 20px;
      color: #444;
    }

    .pentagon-area {
      width: 900px;
      height: 620px;
      margin: 0 auto;
      position: relative;
    }

    .option-btn {
      position: absolute;
      width: 150px;
      height: 150px;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }

    .option-btn.hidden {
      visibility: hidden;
      pointer-events: none;
    }

    .option-btn svg {
      overflow: visible;
    }

    .pos-0 { left: 375px; top: 10px; }
    .pos-1 { left: 120px; top: 170px; }
    .pos-2 { left: 630px; top: 170px; }
    .pos-3 { left: 220px; top: 400px; }
    .pos-4 { left: 530px; top: 400px; }

    .confidence-wrap {
      width: 800px;
      margin: 100px auto 0 auto;
      text-align: center;
    }

    .confidence-title {
      font-size: 30px;
      margin-bottom: 18px;
      font-weight: 600;
    }

    .confidence-subtitle {
      font-size: 18px;
      margin-bottom: 35px;
      color: #444;
    }

    .confidence-buttons {
      display: flex;
      justify-content: center;
      gap: 22px;
      margin-top: 20px;
    }

    .conf-btn {
      width: 90px;
      height: 90px;
      font-size: 32px;
      border-radius: 14px;
      border: 2px solid #222;
      background: white;
      cursor: pointer;
    }

    .confidence-anchor-row {
      width: 520px;
      margin: 14px auto 0 auto;
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      color: #555;
    }

    .small-note {
      font-size: 16px;
      color: #666;
      margin-top: 12px;
    }

    .fixation {
      font-size: 64px;
      font-weight: 600;
    }

    .subject-wrap {
      max-width: 700px;
      margin: 120px auto;
      text-align: center;
      font-size: 24px;
      line-height: 1.6;
    }

    .subject-input {
      font-size: 28px;
      padding: 10px 14px;
      width: 220px;
      text-align: center;
      margin-top: 16px;
    }

    .subject-btn {
      font-size: 22px;
      padding: 10px 22px;
      margin-top: 20px;
      cursor: pointer;
    }

    .error-text {
      color: #b00020;
      margin-top: 12px;
      font-size: 18px;
      min-height: 24px;
    }
  </style>
</head>
<body></body>

<script>
  /**********************
   * 1. BASIC SETTINGS  *
   **********************/
  const CONFIG = {
    nOptions: 5,
    stimulusDurations: [500, 750, 1500, 3000],
    fixationDuration: 700,
    interTrialInterval: 500,
    stimulusRadius: 52,
    svgSize: 120,
    nPracticeTrials: 4
  };

  /*************************
   * 2. HELPER FUNCTIONS   *
   *************************/
  function shuffle(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function mulberry32(seed) {
    return function() {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function downloadCSV(filename, text) {
    const blob = new Blob([text], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.setAttribute("href", url);
    link.setAttribute("download", filename);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  function positionName(index) {
    const map = {
      0: "top",
      1: "upper_left",
      2: "upper_right",
      3: "lower_left",
      4: "lower_right"
    };
    return map[index];
  }

  function generateDots(nDots, seed) {
    const rand = mulberry32(seed);
    const points = [];
    const center = CONFIG.svgSize / 2;
    const margin = 10;
    const radius = CONFIG.stimulusRadius - 6;

    let attempts = 0;
    while (points.length < nDots && attempts < nDots * 250) {
      attempts++;
      const x = margin + rand() * (CONFIG.svgSize - 2 * margin);
      const y = margin + rand() * (CONFIG.svgSize - 2 * margin);

      const dx = x - center;
      const dy = y - center;
      const inside = (dx * dx + dy * dy) <= radius * radius;
      if (!inside) continue;

      let overlaps = false;
      for (const p of points) {
        const ddx = x - p.x;
        const ddy = y - p.y;
        if (ddx * ddx + ddy * ddy < 20) {
          overlaps = true;
          break;
        }
      }
      if (!overlaps) points.push({ x, y });
    }
    return points;
  }

  function renderOptionSVG(option, showDots = true) {
    const center = CONFIG.svgSize / 2;
    const radius = CONFIG.stimulusRadius;

    const outline = `
      <circle cx="${center}" cy="${center}" r="${radius}"
        fill="white" stroke="black" stroke-width="3"></circle>
    `;

    const dots = showDots
      ? option.points.map(p => {
          return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.8" fill="black"></circle>`;
        }).join("")
      : "";

    return `
      <svg width="${CONFIG.svgSize}" height="${CONFIG.svgSize}" viewBox="0 0 ${CONFIG.svgSize} ${CONFIG.svgSize}">
        ${outline}
        ${dots}
      </svg>
    `;
  }

  function renderStimulusDisplay(trialConfig) {
    const optionHTML = trialConfig.options.map((opt, idx) => {
      return `
        <div class="option-btn pos-${idx}" style="cursor: default;">
          ${renderOptionSVG(opt, true)}
        </div>
      `;
    }).join("");

    return `
      <div class="task-wrap">
        <div class="question-title">Which circle has the most dots?</div>
        <div class="question-subtitle">Look carefully.</div>
        <div class="pentagon-area">
          ${optionHTML}
        </div>
      </div>
    `;
  }

  function renderChoiceDisplay() {
    const trialConfig = trialState.currentTrial;
    const optionHTML = trialConfig.options.map((opt, idx) => {
      const hiddenClass = trialState.available[idx] ? "" : "hidden";
      return `
        <button class="option-btn pos-${idx} ${hiddenClass} choice-option"
                data-index="${idx}"
                aria-label="option ${idx + 1}">
          ${renderOptionSVG(opt, false)}
        </button>
      `;
    }).join("");

    return `
      <div class="task-wrap">
        <div class="question-title">Which circle had the most dots?</div>
        <div class="question-subtitle">Choice ${trialState.choiceNumber + 1}</div>
        <div class="pentagon-area">
          ${optionHTML}
        </div>
        <div class="small-note">Click one circle.</div>
      </div>
    `;
  }

  function renderConfidenceDisplay() {
    return `
      <div class="confidence-wrap">
        <div class="confidence-title">How confident are you?</div>
        <div class="confidence-subtitle">
          Confidence for choice ${trialState.choiceNumber}
        </div>

        <div class="confidence-buttons">
          <button class="conf-btn confidence-btn" data-conf="1">1</button>
          <button class="conf-btn confidence-btn" data-conf="2">2</button>
          <button class="conf-btn confidence-btn" data-conf="3">3</button>
          <button class="conf-btn confidence-btn" data-conf="4">4</button>
        </div>

        <div class="confidence-anchor-row">
          <div>Not confident</div>
          <div>Very confident</div>
        </div>
      </div>
    `;
  }

  /**********************************
   * 3. BUILD TRIAL CONFIGURATIONS  *
   **********************************/
  function makeEqualTrial(trialIndex, duration, practice = false) {
    const correctPosition = Math.floor(Math.random() * 5);
    const dotCounts = [50, 50, 50, 50, 50];
    dotCounts[correctPosition] = 58;

    const options = dotCounts.map((nDots, optionIndex) => {
      const points = generateDots(nDots, trialIndex * 100 + optionIndex * 17 + 1);
      return { nDots, points };
    });

    return {
      trialIndex,
      practice,
      duration,
      condition_name: "equal_58_50_50_50_50",
      correctPosition,
      options
    };
  }

  function makeGradedTrial(trialIndex, duration, practice = false) {
    const dotList = shuffle([100, 90, 80, 70, 60]);
    const correctPosition = dotList.indexOf(100);

    const options = dotList.map((nDots, optionIndex) => {
      const points = generateDots(nDots, trialIndex * 100 + optionIndex * 17 + 1);
      return { nDots, points };
    });

    return {
      trialIndex,
      practice,
      duration,
      condition_name: "graded",
      correctPosition,
      options
    };
  }

  function buildPracticeTrials() {
    const durations = shuffle([...CONFIG.stimulusDurations]);
    const trials = [];
    let counter = 1;

    durations.forEach((duration, i) => {
      const isGraded = i % 2 === 0;
      if (isGraded) {
        trials.push(makeGradedTrial(counter++, duration, true));
      } else {
        trials.push(makeEqualTrial(counter++, duration, true));
      }
    });

    return trials;
  }

  function buildMainTrials(startIndex) {
    const trials = [];
    let counter = startIndex;

    CONFIG.stimulusDurations.forEach(duration => {
      trials.push(makeGradedTrial(counter++, duration, false));
      trials.push(makeGradedTrial(counter++, duration, false));
      trials.push(makeEqualTrial(counter++, duration, false));
      trials.push(makeEqualTrial(counter++, duration, false));
    });

    return trials;
  }

  const practiceTrials = buildPracticeTrials();
  const mainTrials = buildMainTrials(practiceTrials.length + 1);
  const allTrials = [...practiceTrials, ...mainTrials];

  /****************************
   * 4. GLOBAL STATE STORAGE *
   ****************************/
  const experimentState = {
    subjectID: ""
  };

  const trialState = {
    currentTrial: null,
    available: [],
    choiceNumber: 0,
    trialStartTime: null,
    choiceScreenStartTime: null,
    confidenceScreenStartTime: null,
    lastChoice: null,
    lastChoiceCorrect: null,
    lastChoiceRT: null
  };

  function initializeTrialState(trialConfig) {
    trialState.currentTrial = trialConfig;
    trialState.available = Array(CONFIG.nOptions).fill(true);
    trialState.choiceNumber = 0;
    trialState.trialStartTime = performance.now();
    trialState.choiceScreenStartTime = null;
    trialState.confidenceScreenStartTime = null;
    trialState.lastChoice = null;
    trialState.lastChoiceCorrect = null;
    trialState.lastChoiceRT = null;
  }

  /***********************
   * 5. JSPSYCH SETUP    *
   ***********************/
  const jsPsych = initJsPsych({
    on_finish: function() {
      const raw = jsPsych.data.get().values();

      const cleaned = raw.map(row => ({
        subject_id: experimentState.subjectID || null,
        event: row.event ?? null,
        rt: row.rt ?? null,
        trial_index: row.trial_index ?? null,
        practice: row.practice ?? null,
        condition_name: row.condition_name ?? null,
        stimulus_duration: row.stimulus_duration ?? null,
        correct_position: row.correct_position ?? null,
        correct_position_name:
          row.correct_position !== undefined && row.correct_position !== null
            ? positionName(row.correct_position)
            : null,
        dot_counts: row.dot_counts ?? null,
        choice_number: row.choice_number ?? null,
        choice_index: row.choice_index ?? null,
        choice_position_name:
          row.choice_index !== undefined && row.choice_index !== null
            ? positionName(row.choice_index)
            : null,
        elapsed_ms_from_trial_start: row.elapsed_ms_from_trial_start ?? null,
        correct: row.correct ?? null,
        remaining_options_before_choice: row.remaining_options_before_choice ?? null,
        confidence_choice_correct: row.choice_correct ?? null,
        confidence_choice_rt: row.choice_rt ?? null,
        confidence: row.confidence ?? null
      }));

      const columns = [
        "subject_id",
        "event",
        "rt",
        "trial_index",
        "practice",
        "condition_name",
        "stimulus_duration",
        "correct_position",
        "correct_position_name",
        "dot_counts",
        "choice_number",
        "choice_index",
        "choice_position_name",
        "elapsed_ms_from_trial_start",
        "correct",
        "remaining_options_before_choice",
        "confidence_choice_correct",
        "confidence_choice_rt",
        "confidence"
      ];

      const escapeCSV = (value) => {
        if (value === null || value === undefined) return "";
        const str = String(value);
        if (str.includes('"') || str.includes(",") || str.includes("\n")) {
          return '"' + str.replace(/"/g, '""') + '"';
        }
        return str;
      };

      const csvLines = [
        columns.join(","),
        ...cleaned.map(row => columns.map(col => escapeCSV(row[col])).join(","))
      ];

      const csv = csvLines.join("\n");
      const safeSubjectID = (experimentState.subjectID || "unknown").replace(/[^\w-]/g, "");
      downloadCSV(`p${safeSubjectID}.csv`, csv);
    }
  });

  const timeline = [];

  /*************************
   * 6. SUBJECT ID SCREEN  *
   *************************/
  const subjectIDScreen = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="subject-wrap">
        <h2>Participant ID</h2>
        <p>Please enter the participant ID before starting.</p>
        <input id="subject-id-input" class="subject-input" type="text" autocomplete="off" />
        <br>
        <button id="subject-id-btn" class="subject-btn">Continue</button>
        <div id="subject-id-error" class="error-text"></div>
      </div>
    `,
    choices: "NO_KEYS",
    on_load: function() {
      const input = document.getElementById("subject-id-input");
      const btn = document.getElementById("subject-id-btn");
      const error = document.getElementById("subject-id-error");

      input.focus();

      function submitID() {
        const value = input.value.trim();
        if (!value) {
          error.textContent = "Please enter a participant ID.";
          return;
        }
        experimentState.subjectID = value;
        jsPsych.finishTrial({
          event: "subject_id_entry",
          subject_id: value
        });
      }

      btn.addEventListener("click", submitID);
      input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
          submitID();
        }
      });
    }
  };
  timeline.push(subjectIDScreen);

  /***********************
   * 7. INSTRUCTIONS     *
   ***********************/
  const instructions = {
    type: jsPsychInstructions,
    pages: [
      `
      <div style="max-width:900px; margin:auto; text-align:left; font-size:22px; line-height:1.6;">
        <h2>Welcome</h2>
        <p>On each trial, you will briefly see <strong>5 circles</strong>.</p>
        <p>Your task is to decide <strong>which circle has the most dots</strong>.</p>
      </div>
      `,
      `
      <div style="max-width:900px; margin:auto; text-align:left; font-size:22px; line-height:1.6;">
        <h2>Important</h2>
        <p>After the dots disappear, the circles will stay on the screen.</p>
        <p>You should choose which circle <strong>had</strong> the most dots.</p>
      </div>
      `,
      `
      <div style="max-width:900px; margin:auto; text-align:left; font-size:22px; line-height:1.6;">
        <h2>Response</h2>
        <p>Click one circle.</p>
        <p>Then report your confidence from <strong>1 to 4</strong>.</p>
        <p>If your choice is wrong, that circle will disappear and you will choose again.</p>
      </div>
      `
    ],
    show_clickable_nav: true
  };
  timeline.push(instructions);

  /**************************
   * 8. GENERIC TRIAL PIECES
   **************************/
  function makeTrialTimeline(trialConfig) {
    const initTrial = {
      type: jsPsychCallFunction,
      func: function() {
        initializeTrialState(trialConfig);
      },
      data: {
        event: "initialize_trial",
        trial_index: trialConfig.trialIndex,
        practice: trialConfig.practice,
        condition_name: trialConfig.condition_name,
        stimulus_duration: trialConfig.duration,
        correct_position: trialConfig.correctPosition
      }
    };

    const fixation = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `<div class="fixation">+</div>`,
      choices: "NO_KEYS",
      trial_duration: CONFIG.fixationDuration,
      data: {
        event: "fixation",
        trial_index: trialConfig.trialIndex,
        practice: trialConfig.practice,
        condition_name: trialConfig.condition_name,
        stimulus_duration: trialConfig.duration,
        correct_position: trialConfig.correctPosition
      }
    };

    const stimulus = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: renderStimulusDisplay(trialConfig),
      choices: "NO_KEYS",
      trial_duration: trialConfig.duration,
      data: {
        event: "stimulus",
        trial_index: trialConfig.trialIndex,
        practice: trialConfig.practice,
        condition_name: trialConfig.condition_name,
        stimulus_duration: trialConfig.duration,
        correct_position: trialConfig.correctPosition,
        dot_counts: JSON.stringify(trialConfig.options.map(x => x.nDots))
      }
    };

    const choice = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        return renderChoiceDisplay();
      },
      choices: "NO_KEYS",
      on_load: function() {
        trialState.choiceScreenStartTime = performance.now();

        const clickable = document.querySelectorAll(".choice-option:not(.hidden)");
        clickable.forEach(btn => {
          btn.addEventListener("click", function() {
            const selectedIndex = parseInt(this.dataset.index, 10);
            const rt = Math.round(performance.now() - trialState.choiceScreenStartTime);
            const elapsedMs = Math.round(performance.now() - trialState.trialStartTime);
            const correct = selectedIndex === trialState.currentTrial.correctPosition;

            jsPsych.finishTrial({
              event: "choice",
              trial_index: trialState.currentTrial.trialIndex,
              practice: trialState.currentTrial.practice,
              condition_name: trialState.currentTrial.condition_name,
              stimulus_duration: trialState.currentTrial.duration,
              correct_position: trialState.currentTrial.correctPosition,
              choice_number: trialState.choiceNumber + 1,
              choice_index: selectedIndex,
              rt: rt,
              elapsed_ms_from_trial_start: elapsedMs,
              correct: correct,
              remaining_options_before_choice: trialState.available.filter(x => x).length
            });
          });
        });
      },
      on_finish: function(data) {
        trialState.choiceNumber += 1;
        trialState.lastChoice = data.choice_index;
        trialState.lastChoiceCorrect = data.correct;
        trialState.lastChoiceRT = data.rt;

        if (!data.correct) {
          trialState.available[data.choice_index] = false;
        }
      }
    };

    const confidence = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        return renderConfidenceDisplay();
      },
      choices: "NO_KEYS",
      on_load: function() {
        trialState.confidenceScreenStartTime = performance.now();

        const buttons = document.querySelectorAll(".confidence-btn");
        buttons.forEach(btn => {
          btn.addEventListener("click", function() {
            const conf = parseInt(this.dataset.conf, 10);
            const rt = Math.round(performance.now() - trialState.confidenceScreenStartTime);

            jsPsych.finishTrial({
              event: "confidence",
              trial_index: trialState.currentTrial.trialIndex,
              practice: trialState.currentTrial.practice,
              condition_name: trialState.currentTrial.condition_name,
              stimulus_duration: trialState.currentTrial.duration,
              correct_position: trialState.currentTrial.correctPosition,
              choice_number: trialState.choiceNumber,
              choice_index: trialState.lastChoice,
              choice_correct: trialState.lastChoiceCorrect,
              choice_rt: trialState.lastChoiceRT,
              confidence: conf,
              rt: rt
            });
          });
        });
      }
    };

    const chooseUntilCorrect = {
      timeline: [choice, confidence],
      loop_function: function() {
        return !trialState.lastChoiceCorrect;
      }
    };

    const iti = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: "",
      choices: "NO_KEYS",
      trial_duration: CONFIG.interTrialInterval,
      data: {
        event: "iti",
        trial_index: trialConfig.trialIndex,
        practice: trialConfig.practice,
        condition_name: trialConfig.condition_name,
        stimulus_duration: trialConfig.duration,
        correct_position: trialConfig.correctPosition
      }
    };

    return {
      timeline: [initTrial, fixation, stimulus, chooseUntilCorrect, iti]
    };
  }

  /***********************
   * 9. BUILD TIMELINE   *
   ***********************/
  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div style="max-width:900px; margin:auto; text-align:center; font-size:26px; line-height:1.7;">
        <h2>Practice</h2>
        <p>You will first complete 4 practice trials.</p>
        <p>The 4 stimulus durations will appear in random order.</p>
        <p>Press any key to begin practice.</p>
      </div>
    `
  });

  practiceTrials.forEach(trialConfig => {
    timeline.push(makeTrialTimeline(trialConfig));
  });

  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div style="max-width:900px; margin:auto; text-align:center; font-size:26px; line-height:1.7;">
        <h2>Main experiment</h2>
        <p>Practice is finished.</p>
        <p>Press any key to begin the main experiment.</p>
      </div>
    `
  });

  mainTrials.forEach((trialConfig, idx) => {
    if (idx === 4 || idx === 8 || idx === 12) {
      timeline.push({
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
          <div style="max-width:900px; margin:auto; text-align:center; font-size:26px; line-height:1.7;">
            <h2>Next block</h2>
            <p>Press any key to continue.</p>
          </div>
        `
      });
    }

    timeline.push(makeTrialTimeline(trialConfig));
  });

  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div style="max-width:900px; margin:auto; text-align:center; font-size:28px; line-height:1.7;">
        <h2>Finished</h2>
        <p>Your cleaned data file will download automatically.</p>
        <p>Thank you.</p>
        <p>Press any key to end.</p>
      </div>
    `
  });

  /***********************
   * 10. RUN EXPERIMENT  *
   ***********************/
  jsPsych.run(timeline);
</script>
</html>
